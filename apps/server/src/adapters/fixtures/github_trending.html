<!DOCTYPE html>
<html>
<head>
  <title>Trending Repositories on GitHub today</title>
</head>
<body>
  <div class="Box">
    <div class="Box-body">
      <article class="Box-row">
        <h2 class="h3 lh-condensed">
          <a href="/torvalds/linux" data-hydro-click="...">
            <svg class="octicon octicon-repo"></svg>
            <span class="text-normal">torvalds / </span>
            linux
          </a>
        </h2>
        <p class="col-9 color-fg-muted my-1 pr-4">
          Linux kernel source tree
        </p>
        <div class="f6 color-fg-muted mt-2">
          <span class="d-inline-block ml-0 mr-3">
            <span class="repo-language-color" style="background-color: #555555"></span>
            <span itemprop="programmingLanguage">C</span>
          </span>
          <a href="/torvalds/linux/stargazers" class="Link--muted d-inline-block mr-3">
            170,000
          </a>
          <a href="/torvalds/linux/forks" class="Link--muted d-inline-block mr-3">
            50,000
          </a>
          <span class="d-inline-block float-sm-right">
            120 stars today
          </span>
        </div>
      </article>

      <article class="Box-row">
        <h2 class="h3 lh-condensed">
          <a href="/oven-sh/bun">
            <span class="text-normal">oven-sh / </span>
            bun
          </a>
        </h2>
        <p class="col-9 color-fg-muted my-1 pr-4">
          Incredibly fast JavaScript frontend &amp; backend runtime
        </p>
        <div class="f6 color-fg-muted mt-2">
          <span class="d-inline-block ml-0 mr-3">
            <span class="repo-language-color" style="background-color: #f1e05a"></span>
            <span itemprop="programmingLanguage">Zig</span>
          </span>
          <a href="/oven-sh/bun/stargazers" class="Link--muted d-inline-block mr-3">
            75,000
          </a>
          <span class="d-inline-block float-sm-right">
            350 stars today
          </span>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
