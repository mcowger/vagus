services:
  vagus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BETTER_AUTH_SECRET=a_very_secret_key_that_is_at_least_32_chars_long
      - DATABASE_PATH=/app/data/vagus.sqlite
    volumes:
      - ./data:/app/data
    restart: unless-stopped
